<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Chapter 6 ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
  <div style="width:100%;">
    <div class="tag">❤️ Birthday Chapter 6</div>
    <h1 style="text-align:center;">25 Reasons You're<br><span class="name">Awesome</span></h1>
    <p class="subtitle" style="text-align:center;">Press the button to reveal them one by one.</p>
    <div class="reasons-box">
      <div class="reason-number" id="count">Reason #1</div>
      <div class="reason-text" id="reason">You make life feel lighter.</div>
    </div>
    <div class="buttons">
      <button id="nextBtn" onclick="nextReason()">Next Reason ➜</button>
      <a href="birthday7.html" class="btn next-page" id="finishBtn">Continue ➜</a>
    </div>
  </div>
</div>
<script>
const reasons = [
  "You make life feel lighter.",
  "You always know how to make me laugh.",
  "You care more than you admit.",
  "Talking to you never feels boring.",
  "Your vibe is always comforting.",
  "You became my favourite notification.",
  "You understand me when nobody else does.",
  "You make ordinary moments special.",
  "I love your weird side.",
  "I love your cute side.",
  "I love your annoying side too. 😭",
  "You make me feel important.",
  "You make me want to become better.",
  "I can be myself around you.",
  "You make distance feel smaller.",
  "Your happiness genuinely matters to me.",
  "You make me smile without even trying.",
  "You became part of my daily routine.",
  "You make me feel lucky.",
  "You never leave my thoughts for long.",
  "I love our conversations.",
  "I love our memories.",
  "I love our story.",
  "I love the person you are.",
  "And most importantly... you're YOU ❤️"
];
let current = 0;
const reasonElement = document.getElementById('reason');
const countElement = document.getElementById('count');
const nextBtn = document.getElementById('nextBtn');
const finishBtn = document.getElementById('finishBtn');
finishBtn.style.display = "none";
function nextReason(){
  if(current < reasons.length - 1){
    current++;
    reasonElement.innerText = reasons[current];
    countElement.innerText = `Reason #${current + 1}`;
  }
  if(current === reasons.length - 1){
    nextBtn.style.display = "none";
    finishBtn.style.display = "inline-flex";
  }
}
</script>
</body>
</html>
