```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Chapter 6 ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#09111f,#1c1738,#44205f,#6d1f4e);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:#ff5ea8;
filter:blur(250px);
opacity:.12;
top:-250px;
left:-250px;
}

body::after{
content:"";
position:absolute;
width:600px;
height:600px;
background:#7c5cff;
filter:blur(220px);
opacity:.12;
bottom:-250px;
right:-250px;
}

.card{
position:relative;
z-index:2;
width:min(900px,100%);
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.12);
border-radius:30px;
padding:50px;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,.4);
}

.tag{
display:inline-block;
padding:10px 18px;
background:rgba(255,255,255,.08);
border-radius:999px;
color:white;
margin-bottom:20px;
}

h1{
font-size:clamp(3rem,6vw,5rem);
color:white;
margin-bottom:15px;
}

.highlight{
font-family:'Dancing Script',cursive;
color:#ff8fc8;
}

.subtitle{
color:#ffd8ea;
margin-bottom:40px;
line-height:1.8;
}

.reason-box{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
padding:40px;
border-radius:25px;
min-height:260px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.reason-number{
font-size:20px;
color:#ffd166;
margin-bottom:15px;
font-weight:600;
}

.reason-text{
font-size:28px;
color:white;
line-height:1.5;
font-weight:600;
}

.buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button,
.next-page{
padding:15px 25px;
border:none;
border-radius:50px;
background:linear-gradient(
135deg,
#ff4f9a,
#ff7b54
);
color:white;

cursor:pointer;
text-decoration:none;
transition:.3s;
}

button:hover,
.next-page:hover{
transform:translateY(-3px);
}

.next-page{
display:none;
}

@media(max-width:768px){

.card{
padding:25px;
}

.reason-text{
font-size:22px;
}

.reason-box{
min-height:220px;
padding:25px;
}

button,
.next-page{
width:100%;
}

}

</style>
</head>

<body>

<div class="card">

<div class="tag">
❤️ Birthday Chapter 6
</div>

<h1>
Reasons I
<span class="highlight">Love You</span>
</h1>

<p class="subtitle">
There are hundreds of reasons why I love you.
These are just a few of them. ❤️
</p>

<div class="reason-box">

<div class="reason-number" id="count">
Reason #1
</div>

<div class="reason-text" id="reason">
Your smile can fix a bad day.
</div>

</div>

<div class="buttons">

<button id="nextBtn" onclick="nextReason()">
Next Reason ➜
</button>

<a href="birthday7.html" class="next-page" id="finishBtn">
Continue ➜
</a>

</div>

</div>

<script>

const reasons = [

"Your smile can fix a bad day.",

"You always manage to make me laugh.",

"You care more than you realize.",

"Talking to you never feels boring.",

"Your voice feels like comfort.",

"You became my favourite notification.",

"You understand me when nobody else does.",

"You make ordinary moments special.",

"I love your weird side.",

"I love your cute side.",

"I love your annoying side too. 😭",

"You make me feel important.",

"You make me want to become better.",

"I can be myself around you.",

"You make distance feel smaller.",

"Your happiness genuinely matters to me.",

"You make me smile without even trying.",

"You became part of my daily routine.",

"You make me feel lucky.",

"You never leave my thoughts.",

"I love our conversations.",

"I love our memories.",

"I love our story.",

"I love the person you are.",

"And most importantly... I love YOU ❤️"

];

let current = 0;

const reasonElement = document.getElementById('reason');
const countElement = document.getElementById('count');
const nextBtn = document.getElementById('nextBtn');
const finishBtn = document.getElementById('finishBtn');

finishBtn.style.display = "none";

function nextReason(){

if(current < reasons.length - 1){

current++;

reasonElement.innerText = reasons[current];
countElement.innerText = `Reason #${current + 1}`;

}

if(current === reasons.length - 1){

nextBtn.style.display = "none";
finishBtn.style.display = "inline-block";

}

}

</script>

</body>
</html>
